services:
  buyer-cabinet:
    build: .
    ports:
      - "8003:8003"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-True}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-buyer_cabinet}
      B2B_URL: ${B2B_URL:-http://seller-cabinet:8001}
      SERVICE_API_KEY: ${SERVICE_API_KEY:-dev-service-api-key}
    depends_on:
      db:
        condition: service_healthy
    # Migrations run in image ENTRYPOINT (entrypoint.sh) before CMD (runserver).

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-buyer_cabinet}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-buyer_cabinet}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
