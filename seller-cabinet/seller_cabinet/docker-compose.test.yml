
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seller_cabinet_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seller_cabinet_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  tests:
    build: .
    environment:
      SECRET_KEY: test-secret-key-not-for-production
      DEBUG: "True"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: seller_cabinet_test
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "manage.py", "test", "--noinput"]

volumes:
  pgdata_test:
