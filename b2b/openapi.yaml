openapi: 3.0.3
info:
  title: Seller Cabinet B2B Service API
  version: 1.0.0
paths:
  /api/v1/products:
    get:
      summary: B2C visible product catalog
      description: Requires X-Service-Key for service-to-service access.
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
        - in: query
          name: ids
          required: false
          schema:
            type: string
          description: Comma-separated SKU IDs.
      responses:
        "200":
          description: Visible products only.
        "401":
          description: Missing or invalid service key.
  /api/v1/products/list:
    get:
      summary: Seller product list (paginated)
      description: |
        Returns products of the authenticated seller (JWT Bearer).
        Query parameter `seller_id` is ignored (IDOR protection).
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [ACTIVE, BLOCKED, DELETED]
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Case-insensitive substring match in product title.
      responses:
        "200":
          description: Paginated seller products.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProductList"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/inventory/reserve:
    post:
      summary: Reserve SKU quantities for an order
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveRequest"
      responses:
        "200":
          description: Reservation applied or idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveResponse"
        "401":
          description: Missing or invalid service key.
        "409":
          description: Insufficient stock for at least one SKU; no changes applied.
  /api/v1/fulfill:
    post:
      summary: Fulfill order delivery (deduct reserved quantity only)
      description: |
        Called when an order is shipped. Decreases `reserved_quantity` only;
        `active_quantity` is unchanged. Idempotent by `order_id`.
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FulfillCommand"
      responses:
        "200":
          description: Fulfill applied or idempotent replay.
        "400":
          description: Invalid request (e.g. SKU not found, quantity exceeds reserved).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid service key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/inventory/unreserve:
    post:
      summary: Release reserved SKU quantities for an order
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnreserveRequest"
      responses:
        "200":
          description: Unreserve applied or idempotent replay.
        "403":
          description: Cannot unreserve reservation belonging to another order.
        "401":
          description: Missing or invalid service key.
  /api/v1/events/moderation:
    post:
      summary: Apply moderation decision to a product
      description: |
        Canonical payload for moderation decision replication.
        Idempotency is scoped to `(X-Service-Id, idempotency_key)`.
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Service-Id
          required: true
          schema:
            type: string
          description: Calling service identifier for idempotency scoping.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerationEvent"
      responses:
        "204":
          description: Event applied or idempotent replay (no response body).
        "400":
          description: Invalid request (e.g. missing X-Service-Id).
        "401":
          description: Missing or invalid service key.
components:
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    ProductListItem:
      type: object
      required:
        - id
        - title
        - description
        - status
        - deleted
        - created_at
        - updated_at
        - skus_count
        - total_active_quantity
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [ACTIVE, BLOCKED, DELETED]
        deleted:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        skus_count:
          type: integer
          minimum: 0
        total_active_quantity:
          type: integer
          minimum: 0
    PaginatedProductList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProductListItem"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
    FulfillCommand:
      type: object
      required: [order_id, sku_id, quantity]
      properties:
        order_id:
          type: string
          format: uuid
          description: Order idempotency key.
        sku_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
    ReserveItem:
      type: object
      required: [sku_id, quantity]
      properties:
        sku_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
    ReserveRequest:
      type: object
      required: [order_id, items]
      properties:
        order_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReserveItem"
    ReserveResponse:
      type: object
      required: [order_id, status, reserved_at]
      properties:
        order_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [RESERVED]
        reserved_at:
          type: string
          format: date-time
    UnreserveRequest:
      type: object
      required: [order_id, items]
      properties:
        order_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: object
            required: [sku_id]
            properties:
              sku_id:
                type: string
                format: uuid
    ModerationEvent:
      type: object
      required: [product_id, event_type, hard_block, occurred_at, idempotency_key]
      properties:
        product_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum: [MODERATED, BLOCKED]
          description: "MODERATED - producto aprobado, BLOCKED - producto bloqueado"
        hard_block:
          type: boolean
          description: "true - bloqueo permanente (HARD_BLOCKED), false - bloqueo temporal (BLOCKED)"
        occurred_at:
          type: string
          format: date-time
        field_reports:
          nullable: true
          oneOf:
            - type: array
              items:
                type: object
              description: "Поле с описанием причин блокировки"
            - type: "null"
        blocking_reason_id:
          type: string
          format: uuid
          nullable: true
          description: "ID причины блокировки из справочника BlockingReason"
        idempotency_key:
          type: string
          format: uuid
