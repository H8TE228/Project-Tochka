
openapi: 3.0.3
info:
  title: Seller Cabinet B2B Service API
  version: 1.0.0
paths:
  /api/v1/products:
    get:
      summary: B2C visible product catalog
      description: Requires X-Service-Key for service-to-service access.
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
        - in: query
          name: ids
          required: false
          schema:
            type: string
          description: Comma-separated SKU IDs.
      responses:
        "200":
          description: Visible products only.
        "401":
          description: Missing or invalid service key.
  /api/v1/reserve:
    post:
      summary: Reserve SKU quantities
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveCommand"
      responses:
        "200":
          description: Reservation applied or idempotent replay.
        "401":
          description: Missing or invalid service key.
        "409":
          description: Insufficient stock for at least one SKU; no changes applied.
  /api/v1/fulfill:
    post:
      summary: Fulfill order delivery (deduct reserved quantity only)
      description: |
        Called when an order is shipped. Decreases `reserved_quantity` only;
        `active_quantity` is unchanged. Idempotent by `order_id`.
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FulfillCommand"
      responses:
        "200":
          description: Fulfill applied or idempotent replay.
        "400":
          description: Invalid request (e.g. SKU not found, quantity exceeds reserved).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid service key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/unreserve:
    post:
      summary: Release reserved SKU quantities
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveCommand"
      responses:
        "200":
          description: Unreserve applied or idempotent replay.
        "400":
          description: Trying to unreserve more than reserved.
        "401":
          description: Missing or invalid service key.
  /api/v1/events/moderation:
    post:
      summary: Apply moderation decision to product by SKU
      description: |
        Canonical payload for moderation decision replication.
        ADR note: `sku_id` is used as a stable linkage to product ownership from B2C domain.
      parameters:
        - in: header
          name: X-Service-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerationEvent"
      responses:
        "200":
          description: Event applied or idempotent replay.
        "401":
          description: Missing or invalid service key.
components:
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    FulfillCommand:
      type: object
      required: [order_id, sku_id, quantity]
      properties:
        order_id:
          type: string
          format: uuid
          description: Order idempotency key.
        sku_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
    ReserveItem:
      type: object
      required: [sku_id, quantity]
      properties:
        sku_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
    ReserveCommand:
      type: object
      required: [items, idempotency_key]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReserveItem"
        idempotency_key:
          type: string
          format: uuid
    ModerationEvent:
      type: object
      required: [sku_id, status, hard_block, idempotency_key]
      properties:
        sku_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [MODERATED, BLOCKED]
        hard_block:
          type: boolean
        field_reports:
          nullable: true
          oneOf:
            - type: array
              items:
                type: object
            - type: "null"
        blocking_reason:
          type: string
          nullable: true
        idempotency_key:
          type: string
          format: uuid
